:root{--or:#FF4D00;--cy:#00D4FF;--ye:#FFD600;--gr:#00FF87;--pk:#FF2D78;--pu:#A855F7;--mu:#4A5060;--su:#0D0F12;--bd:#1C1F24;--fa:#141618}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#1C1F24;border-radius:4px}
input,select,button,textarea{font-family:inherit}
input[type=number]::-webkit-inner-spin-button{opacity:.4}

#hdr{background:var(--su);border-bottom:1px solid var(--bd);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200}
#hdr h1{font-size:17px;letter-spacing:4px;color:var(--or);font-weight:800;text-transform:uppercase}
#hdr .sub{font-size:8px;color:var(--mu);letter-spacing:3px;margin-top:1px}
.hright{display:flex;gap:14px;align-items:center}
.sbadge{text-align:center;cursor:pointer}
.sbadge .si{font-size:15px}
.sbadge .sc{font-size:9px;color:var(--mu)}
.wdisplay{text-align:right}
.wkg{font-size:20px;font-weight:700}
.wdelta{font-size:10px;margin-top:1px}

#tabs{background:var(--su);border-bottom:1px solid var(--bd);display:flex;overflow-x:auto;scrollbar-width:none}
#tabs::-webkit-scrollbar{display:none}
.tbtn{background:none;border:none;padding:10px 11px;color:var(--mu);font-size:9px;letter-spacing:2px;white-space:nowrap;border-bottom:2px solid transparent;font-weight:600;text-transform:uppercase;cursor:pointer}
.tbtn.on{color:var(--or);border-bottom-color:var(--or)}

#cont{padding:14px 12px 50px;max-width:900px;margin:0 auto}
.pg{display:none}.pg.on{display:block}

.card{background:var(--su);border:1px solid var(--bd);border-radius:14px;padding:18px;margin-bottom:12px}
.lbl{font-size:9px;color:var(--mu);letter-spacing:3px;margin-bottom:8px;text-transform:uppercase;font-weight:700}
.bignum{font-size:26px;font-weight:700}

.row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}

.mt8{margin-top:8px}.mb8{margin-bottom:8px}.mt12{margin-top:12px}.mb12{margin-bottom:12px}

.btn:disabled{opacity:.4;cursor:not-allowed}
.bor{background:var(--or);color:#000}
.bgh{background:transparent;color:var(--mu);border:1px solid var(--bd)}
.bdn{background:transparent;color:var(--pk);border:1px solid #FF2D7855}
.bsm{padding:7px 13px;font-size:11px}
.bful{width:100%}

.inp{background:var(--fa);border:1px solid var(--bd);color:#E8EAF0;padding:9px 12px;border-radius:8px;font-size:13px;outline:none;width:100%}

.mbar-row{display:flex;justify-content:space-between;font-size:10px;margin-bottom:4px}

.ptrack{background:var(--fa);border-radius:6px;height:8px;overflow:hidden;margin-bottom:8px}
.pfill{height:100%;border-radius:6px;transition:width .5s}

.fc{font-size:8px;color:var(--mu);margin-top:2px}
.fk{font-size:14px;font-weight:700;color:var(--or);text-align:right}
.fm{font-size:8px;color:var(--mu);text-align:right;margin-top:2px}

.jtime{font-size:8px;color:var(--mu)}
.badge{font-size:8px;padding:2px 8px;border-radius:20px;font-weight:600}
.bcy{background:#00D4FF22;color:var(--cy)}
.bye{background:#FFD60022;color:var(--ye)}
.bor2{background:#FF4D0022;color:var(--or)}

.setgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(88px,1fr));gap:6px}
.setbox{background:var(--fa);border-radius:7px;padding:7px 8px}
.setlbl{font-size:8px;color:var(--mu);letter-spacing:2px;margin-bottom:5px;font-weight:600}
.setinps{display:flex;gap:4px;align-items:center}
.sinp{width:36px;background:transparent;border:none;border-bottom:1px solid var(--bd);color:#E8EAF0;font-size:13px;text-align:center;outline:none}

.srow{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;background:var(--fa);cursor:pointer;margin-bottom:6px}
.sck{width:22px;height:22px;border-radius:6px;border:2px solid var(--bd);background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px;font-weight:700;color:#000;transition:all .15s}

.sname{font-size:12px;font-weight:600}
.sname.dn{text-decoration:line-through;color:var(--mu)}
.smeta{display:flex;gap:8px;margin-top:2px}
.sdose{font-size:9px;color:var(--or);background:#FF4D0015;padding:1px 7px;border-radius:20px}
.stim{font-size:9px;color:var(--mu)}

.dcard{background:var(--su);border:1px solid var(--bd);border-radius:14px;padding:16px;cursor:pointer;margin-bottom:8px}
.dtop{display:flex;justify-content:space-between;margin-bottom:4px}
.dtag{font-size:8px;padding:2px 8px;border-radius:20px;font-weight:700}
.dname{font-size:13px;font-weight:700;letter-spacing:1px;color:#E8EAF0;margin:3px 0}
.dcnt{font-size:9px;color:var(--mu)}

.dqbtns{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}

.exinp{background:transparent;border:none;color:#E8EAF0;font-size:11px;outline:none;flex:1;min-width:80px}

.tpill{border-radius:20px;font-size:8px;letter-spacing:2px;text-transform:uppercase;padding:3px 10px;font-weight:700;cursor:pointer;border:none}

video{width:100%;border-radius:10px;display:block}
.scanwrap{position:relative;border-radius:10px;overflow:hidden;margin-bottom:10px}
.scanline{position:absolute;top:50%;left:15%;width:70%;height:2px;background:var(--or);box-shadow:0 0 10px var(--or);transform:translateY(-50%)}

.photoprev{width:100%;max-height:200px;object-fit:cover;border-radius:10px;display:block;margin-bottom:12px}
.loader{width:16px;height:16px;border:2px solid var(--or);border-top-color:transparent;border-radius:50%;animation:spin .8s linear infinite;display:inline-block;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}

.empty{text-align:center;color:var(--mu);padding:50px 20px}
.empty .ei{font-size:40px;margin-bottom:12px}
.empty .et{font-size:11px;letter-spacing:2px;text-transform:uppercase}

#toast{position:fixed;top:16px;right:16px;left:16px;max-width:340px;margin:0 auto;background:var(--su);border:1px solid var(--or);color:#E8EAF0;padding:12px 20px;border-radius:10px;z-index:9999;font-size:13px;box-shadow:0 0 24px #FF4D0044;opacity:0;transform:translateY(-8px);transition:all .25s;pointer-events:none;text-align:center}
#toast.on{opacity:1;transform:none}

.scanvid{display:none}
.scanvid.on{display:block}
</style>
</head>

/* ===================== COMPUTED ===================== */
function dayTotals(date){
  let kcal=0,p=0,c=0,f=0;
  const dm=cals[date]||{};
  for(const m of MEALS){
    for(const e of (dm[m.id]||[])){
      kcal+=pf(e.kcal);p+=pf(e.p);c+=pf(e.c);f+=pf(e.f);
    }
  }
  return{kcal,p,c,f};
}
function mealKcal(date,mid){
  return ((cals[date]||{})[mid]||[]).reduce((s,e)=>s+pf(e.kcal),0);
}
function latM(){ return meas[meas.length-1]; }
function prevM(){ return meas[meas.length-2]; }
function fstM(){ return meas[0]; }

function updateHdr(){
  const lat=latM(); const fst=fstM();
  document.getElementById('wkg').textContent = lat?.poids ? lat.poids+' kg' : '— kg';
  const de=document.getElementById('wdelta');
  if(lat&&fst&&lat!==fst){
    const d=(pf(lat.poids)-pf(fst.poids)).toFixed(1);
    de.textContent=(d>0?'+':'')+d+' kg';
    de.style.color=d<0?'var(--gr)':'var(--or)';
  } else { de.textContent=''; }
  const today=ts(); const tlog=slog[today]||{};
  const done=supp.filter(s=>tlog[s.id]).length;
  document.getElementById('sc').textContent=done+'/'+supp.length;
  document.getElementById('si').textContent=(done>=supp.length&&supp.length>0)?'✅':'💊';
}

/* ===================== SVG CHARTS ===================== */
function svgLine(data,key,color){
  if(data.length<2) return el('div');
  const W=340,H=140,pl=40,pr=10,pt=10,pb=28;
  const iW=W-pl-pr, iH=H-pt-pb;
  const vals=data.map(d=>pf(d[key]));
  const mn=Math.min(...vals), mx=Math.max(...vals), rng=mx-mn||1;
  const px=i=>pl+(i/(data.length-1))*iW;
  const py=v=>pt+iH-((v-mn)/rng)*iH;
  const pts=data.map((d,i)=>`${px(i)},${py(pf(d[key]))}`).join(' ');
  const fill=`${pl},${pt+iH} ${pts} ${pl+iW},${pt+iH}`;
  const gid='g'+uid();
  let yl='',xl='';
  for(let i=0;i<=3;i++){
    const v=(mn+rng*i/3).toFixed(1);
    const y=py(pf(v));
    yl+=`<line x1="${pl}" y1="${y}" x2="${pl+iW}" y2="${y}" stroke="#1C1F24" stroke-dasharray="3,3"/>`;
    yl+=`<text x="${pl-4}" y="${y+3}" text-anchor="end" fill="#4A5060" font-size="9">${v}</text>`;
  }
  const step=Math.max(1,Math.floor(data.length/4));
  data.forEach((d,i)=>{
    if(i===0||i===data.length-1||i%step===0)
      xl+=`<text x="${px(i)}" y="${H-4}" text-anchor="middle" fill="#4A5060" font-size="9">${d.date||''}</text>`;
  });
  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('viewBox',`0 0 ${W} ${H}`);svg.setAttribute('width','100%');svg.setAttribute('height',H);
  svg.innerHTML=`<defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${color}" stop-opacity=".35"/><stop offset="100%" stop-color="${color}" stop-opacity="0"/></linearGradient></defs>${yl}<polygon points="${fill}" fill="url(#${gid})"/><polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linejoin="round"/>${data.map((d,i)=>`<circle cx="${px(i)}" cy="${py(pf(d[key]))}" r="3" fill="${color}"/>`).join('')}${xl}`;
  return svg;
}
function svgBar(data,key,color){
  if(!data.length) return el('div');
  const W=340,H=170,pl=40,pr=10,pt=20,pb=28;
  const iW=W-pl-pr, iH=H-pt-pb;
  const vals=data.map(d=>pf(d[key]));
  const mx=Math.max(...vals,1);
  const bw=Math.min(38,iW/data.length-4);
  let bars='',xl='';
  data.forEach((d,i)=>{
    const v=pf(d[key]);
    const x=pl+(i/data.length)*iW+(iW/data.length-bw)/2;
    const bh=(v/mx)*iH;
    const y=pt+iH-bh;
    bars+=`<rect x="${x}" y="${y}" width="${bw}" height="${bh}" fill="${color}" rx="3"/>`;
    bars+=`<text x="${x+bw/2}" y="${y-4}" text-anchor="middle" fill="${color}" font-size="9" font-weight="700">${v}</text>`;
    xl+=`<text x="${x+bw/2}" y="${H-3}" text-anchor="middle" fill="#4A5060" font-size="8">${d.date||''}</text>`;
  });
  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('viewBox',`0 0 ${W} ${H}`);svg.setAttribute('width','100%');svg.setAttribute('height',H);
  svg.innerHTML=`<line x1="${pl}" y1="${pt}" x2="${pl}" y2="${pt+iH}" stroke="#1C1F24"/><line x1="${pl}" y1="${pt+iH}" x2="${pl+iW}" y2="${pt+iH}" stroke="#1C1F24"/>${bars}${xl}`;
  return svg;
}
function svgMultiLine(data,series){
  if(data.length<2) return el('div');
  const W=340,H=160,pl=40,pr=10,pt=10,pb=28;
  const iW=W-pl-pr, iH=H-pt-pb;
  let allV=[];
  series.forEach(([k])=>data.forEach(d=>{ if(d[k]!=null) allV.push(pf(d[k])); }));
  if(!allV.length) return el('div');
  const mn=Math.min(...allV), mx=Math.max(...allV), rng=mx-mn||1;
  const px=i=>pl+(i/(data.length-1||1))*iW;
  const py=v=>pt+iH-((v-mn)/rng)*iH;
  let yl='',xl='',lines='';
  for(let i=0;i<=3;i++){
    const v=(mn+rng*i/3).toFixed(0);
    const y=py(pf(v));
    yl+=`<line x1="${pl}" y1="${y}" x2="${pl+iW}" y2="${y}" stroke="#1C1F24" stroke-dasharray="3,3"/>`;
    yl+=`<text x="${pl-4}" y="${y+3}" text-anchor="end" fill="#4A5060" font-size="9">${v}</text>`;
  }
  const step=Math.max(1,Math.floor(data.length/4));
  data.forEach((d,i)=>{if(i===0||i===data.length-1||i%step===0) xl+=`<text x="${px(i)}" y="${H-3}" text-anchor="middle" fill="#4A5060" font-size="8">${d.date||''}</text>`;});
  series.forEach(([k,col])=>{
    const pts=data.map((d,i)=>d[k]!=null?`${px(i)},${py(pf(d[k]))}`:null).filter(Boolean);
    if(pts.length>=2) lines+=`<polyline points="${pts.join(' ')}" fill="none" stroke="${col}" stroke-width="2" stroke-linejoin="round"/>`;
  });
  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('viewBox',`0 0 ${W} ${H}`);svg.setAttribute('width','100%');svg.setAttribute('height',H);
  svg.innerHTML=yl+lines+xl;
  return svg;
}
function macroBar(label,val,goal,color){
  const pct=clamp((val/goal)*100,0,100);
  const over=val>goal;
  const d=el('div');
  d.innerHTML=`<div class="mbar-row"><span style="color:var(--mu)">${label}</span><span style="color:${over?'var(--pk)':color}">${val.toFixed(0)}<span style="color:var(--mu)">/${goal}g</span></span></div><div class="mbar-track"><div class="mbar-fill" style="width:${pct}%;background:${color}"></div></div>`;
  return d;
}
function progBar(pct,color){
  const d=el('div','ptrack');
  d.innerHTML=`<div class="pfill" style="width:${clamp(pct,0,100)}%;background:${color}"></div>`;
  return d;
}

/* ===================== NAVIGATION ===================== */
function goTab(name){
  if(name!=='calories'&&scanning) stopScan();
  curTab=name;
  document.querySelectorAll('.pg').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.tbtn').forEach(b=>b.classList.remove('on'));
  document.getElementById('pg-'+name).classList.add('on');
  const tabs=['dashboard','seances','mensurations','perfs','calories','supplements','params'];
  const idx=tabs.indexOf(name);
  if(idx>=0) document.querySelectorAll('.tbtn')[idx].classList.add('on');
  render(name);
}
function render(name){
  if(name==='dashboard')    drawDash();
  if(name==='seances')      drawSess();
  if(name==='mensurations') drawMeas();
  if(name==='perfs')        drawPerfs();
  if(name==='calories')     drawCal();
  if(name==='supplements')  drawSupp();
  if(name==='params')       drawParams();
}

  // Stats

  cc.appendChild(tr);

  pb.style.marginBottom='10px'; cc.appendChild(pb);
  cc.appendChild(macroBar('Protéines',tot.p,sett.protGoal,'var(--cy)'));

  const mg=el('div','g4 mt8');

    b.onclick=()=>{ actMeal=m.id; goTab('calories'); };

  });

  pg.appendChild(cc);

  // Supplements mini
  const sc=el('div','card');

  sc.appendChild(sr);

    const row=el('div','srow');
    const isDone=!!tlog[s.id];

  const ft=el('div','row mt12');

function addEntry(entry,date){
  const e={id:uid(),time:new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}),...entry};
  if(!cals[date]) cals[date]={};
  if(!cals[date][actMeal]) cals[date][actMeal]=[];

  sv('cal',cals);
  selFood=null; barRes=null; barErr=''; photoB64=null; photoSrc=null; aiRes=null; dbPor=100; barPor=100;
  toast('+'+Math.round(entry.kcal)+' kcal → '+MEALS.find(m=>m.id===actMeal)?.label);

}

async function startScan(){
  barErr=''; barRes=null;
  try{
    vidStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
    scanning=true; drawCal();
    const vid=document.getElementById('scan-vid');
    if(vid){ vid.srcObject=vidStream; await vid.play(); }
    if('BarcodeDetector' in window){
      const det=new BarcodeDetector({formats:['ean_13','ean_8','upc_a','code_128']});
      scanIv=setInterval(async()=>{
        const vid=document.getElementById('scan-vid');
        if(!vid||vid.readyState<2) return;
        try{ const codes=await det.detect(vid); if(codes.length){ clearInterval(scanIv); stopScan(false); fetchBar(codes[0].rawValue,calDate()); } }catch{}
      },500);
    }
  }catch{ barErr='Caméra inaccessible. Saisis le code manuellement.'; scanning=false; drawCal(); }
}
function stopScan(redraw=true){
  clearInterval(scanIv);
  if(vidStream){ vidStream.getTracks().forEach(t=>t.stop()); vidStream=null; }
  scanning=false;
  if(redraw) drawCal();
}
async function fetchBar(code,date){
  barErr=''; barRes=null; drawCal();
  try{
    const res=await fetch(`https://world.openfoodfacts.org/api/v0/product/${code}.json`);
    const d=await res.json();
    if(d.status===1&&d.product){
      const n=d.product.nutriments||{};
      barRes={name:d.product.product_name_fr||d.product.product_name||'Produit',brand:d.product.brands||'',code,kcal:n['energy-kcal_100g']||0,p:n.proteins_100g||0,c:n.carbohydrates_100g||0,f:n.fat_100g||0,image:d.product.image_thumb_url||null};
    } else { barErr=`Produit "${code}" introuvable.`; }
  }catch{ barErr='Erreur réseau.'; }
  barPor=100; drawCal();
}

      // Google Gemini (GRATUIT)
      const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${sett.apiKey}`,{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({contents:[{parts:[{inline_data:{mime_type:'image/jpeg',data:photoB64}},{text:prompt}]}],generationConfig:{temperature:0.1,maxOutputTokens:400}})
      });
      const d=await res.json();
      if(d.error) throw new Error(d.error.message||'Erreur Gemini');
      txt=d.candidates?.[0]?.content?.parts?.[0]?.text||'';
    } else {
      // Anthropic Claude
      const res=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json','x-api-key':sett.apiKey,'anthropic-version':'2023-06-01'},
        body:JSON.stringify({model:'claude-opus-4-5',max_tokens:400,messages:[{role:'user',content:[{type:'image',source:{type:'base64',media_type:'image/jpeg',data:photoB64}},{type:'text',text:prompt}]}]})
      });
      const d=await res.json();
      if(d.error) throw new Error(d.error.message||'Erreur Anthropic');
      txt=(d.content||[]).map(c=>c.text||'').join('');
    }
    // Parse JSON — extract from possible surrounding text
    const match=txt.match(/\{[\s\S]*\}/);
    if(!match) throw new Error('Réponse invalide');
    aiRes=JSON.parse(match[0]);
  }catch(e){ aiRes={error:'Analyse échouée : '+(e.message||'Vérifie ta clé API dans Paramètres.')}; }
  aiLoad=false; drawCal();
}

// Manual
function drawManual(pg,date){
  const c=el('div','card');
  c.innerHTML='<div class="lbl">SAISIE MANUELLE</div>';
  const g=el('div');
  g.style.cssText='display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-bottom:12px';
  [['mn','NOM DU PLAT','text','Ex: Omelette',true],['mk','CALORIES','number','0',false],['mp','PROTEINES (g)','number','0',false],['mc','GLUCIDES (g)','number','0',false],['mf','LIPIDES (g)','number','0',false]].forEach(([id,lbl,type,ph,full])=>{
    const w=el('div'); if(full) w.style.gridColumn='1/-1';
    w.innerHTML=`<div style="font-size:9px;color:var(--mu);letter-spacing:2px;margin-bottom:5px">${lbl}</div>`;
    const i=el('input'); i.type=type; i.className='inp'; i.id=id; i.placeholder=ph;
    w.appendChild(i); g.appendChild(w);
  });
  c.appendChild(g);
  const ab=el('button','btn bor bsm'); ab.textContent='AJOUTER';
  ab.onclick=()=>{
    const name=document.getElementById('mn')?.value;
    const kcal=pf(document.getElementById('mk')?.value);
    if(!name||!kcal){ toast('⚠️ Nom et calories requis'); return; }
    addEntry({name,kcal,p:pf(document.getElementById('mp')?.value),c:pf(document.getElementById('mc')?.value),f:pf(document.getElementById('mf')?.value)},date);
  };
  c.appendChild(ab); pg.appendChild(c);
}

/* ===================== SUPPLEMENTS ===================== */
function toggleSupp(id,from){
  const today=ts();
  if(!slog[today]) slog[today]={};
  slog[today][id]=!slog[today][id];
  sv('slog',slog); updateHdr();
  if(from==='dashboard') drawDash();
  else drawSupp();
}
function drawSupp(){
  const pg=document.getElementById('pg-supplements'); pg.innerHTML='';
  const today=ts(); const tlog=slog[today]||{};
  const done=supp.filter(s=>tlog[s.id]).length;
  updateHdr();

  // Header
  const hdr=el('div','rowb mb12');
  hdr.innerHTML='<div class="lbl" style="margin:0">Compléments alimentaires</div>';
  const ab=el('button','btn bor bsm'); ab.textContent='+ Ajouter';
  ab.onclick=()=>{ suppForm=!suppForm; drawSupp(); };
  hdr.appendChild(ab); pg.appendChild(hdr);

  // Form
  if(suppForm){
    const fc=el('div','card mb12');
    fc.innerHTML='<div class="lbl">NOUVEAU COMPLÉMENT</div>';
    const g=el('div');
    g.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px';
    [['ns-n','NOM',true],['ns-d','DOSAGE',false],['ns-t','MOMENT',false]].forEach(([id,lbl,full])=>{
      const w=el('div'); if(full) w.style.gridColumn='1/-1';
      w.innerHTML=`<div style="font-size:9px;color:var(--mu);letter-spacing:2px;margin-bottom:5px">${lbl}</div>`;
      const i=el('input'); i.className='inp'; i.id=id;
      w.appendChild(i); g.appendChild(w);
    });
    fc.appendChild(g);
    const sb=el('button','btn bor bsm'); sb.textContent='AJOUTER';
    sb.onclick=()=>{
      const name=document.getElementById('ns-n')?.value; if(!name) return;
      supp.push({id:uid(),name,dose:document.getElementById('ns-d')?.value||'',timing:document.getElementById('ns-t')?.value||''});
      sv('sup',supp); suppForm=false; drawSupp(); toast('✅ Complément ajouté !');
    };
    fc.appendChild(sb); pg.appendChild(fc);
  }

  // Progress
  const pc=el('div','card mb12');
  const pr=el('div','rowb mb8');
  pr.innerHTML=`<div class="lbl" style="margin:0">AUJOURD'HUI</div><div style="font-size:20px;font-weight:700;color:${done>=supp.length&&supp.length>0?'var(--gr)':'var(--or)'}">${done}<span style="color:var(--mu);font-size:13px">/${supp.length}</span></div>`;
  pc.appendChild(pr);
  pc.appendChild(progBar(supp.length>0?(done/supp.length)*100:0,done>=supp.length&&supp.length>0?'var(--gr)':'var(--or)'));
  pg.appendChild(pc);

  // List
  supp.forEach(s=>{
    const isDone=!!tlog[s.id];
    const c=el('div','card mb8'); c.style.borderLeft=`3px solid ${isDone?'var(--gr)':'var(--bd)'}`;
    const row=el('div','row');
    const ck=el('div','sck'+(isDone?' dn':'')); ck.textContent=isDone?'✓':'';
    ck.style.cursor='pointer'; ck.onclick=()=>toggleSupp(s.id,'supp');
    const info=el('div'); info.style.flex='1';
    info.innerHTML=`<div class="sname ${isDone?'dn':''}">${s.name}</div><div class="smeta">${s.dose?`<span class="sdose">${s.dose}</span>`:''}<span class="stim">${s.timing}</span></div>`;
    const rm=el('button','rmbtn'); rm.textContent='×';
    rm.onclick=()=>{ supp=supp.filter(x=>x.id!==s.id); sv('sup',supp); drawSupp(); };
    row.append(ck,info,rm); c.appendChild(row); pg.appendChild(c);
  });
}

/* ===================== PARAMÈTRES ===================== */
function drawParams(){
  const pg=document.getElementById('pg-params'); pg.innerHTML='';
  if(!sdraft) sdraft={...sett};

  // Goals
  const gc=el('div','card mb12');
  const gh=el('div','rowb mb12');
  gh.innerHTML='<div class="lbl" style="margin:0">OBJECTIFS NUTRITIONNELS</div>';
  if(!editGoals){
    const eb=el('button','btn bor bsm'); eb.textContent='✏️ MODIFIER';
    eb.onclick=()=>{ editGoals=true; drawParams(); };
    gh.appendChild(eb);
  } else {
    const row=el('div','row');
    const sb=el('button','btn bor bsm'); sb.textContent='💾 SAUVER';
    sb.onclick=()=>{ sett={...sdraft}; sv('cfg',sett); editGoals=false; drawParams(); toast('✅ Paramètres sauvegardés !'); };
    const cb=el('button','btn bgh bsm'); cb.textContent='Annuler';
    cb.onclick=()=>{ sdraft={...sett}; editGoals=false; drawParams(); };
    row.append(sb,cb); gh.appendChild(row);
  }
  gc.appendChild(gh);

  const gg=el('div');
  gg.style.cssText='display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px';
  [{k:'calGoal',l:'Calories/jour',u:'kcal',i:'🔥',c:'var(--or)'},{k:'protGoal',l:'Protéines/jour',u:'g',i:'🥩',c:'var(--cy)'},{k:'carbGoal',l:'Glucides/jour',u:'g',i:'🍚',c:'var(--ye)'},{k:'fatGoal',l:'Lipides/jour',u:'g',i:'🥑',c:'var(--gr)'}].forEach(({k,l,u,i,c})=>{
    const box=el('div','goalbox');
    box.innerHTML=`<div class="gl">${i} ${l}</div>`;
    if(editGoals){
      const row=el('div','row');
      const inp=el('input'); inp.type='number'; inp.className='inp'; inp.value=sdraft[k];
      inp.oninput=e=>{ sdraft[k]=parseInt(e.target.value)||0; };
      const sp=el('span'); sp.textContent=u; sp.style.cssText='font-size:9px;color:var(--mu)';
      row.append(inp,sp); box.appendChild(row);
    } else {
      box.insertAdjacentHTML('beforeend',`<div class="gv" style="color:${c}">${sett[k]}<span style="font-size:10px;color:var(--mu)"> ${u}</span></div>`);
    }
    gg.appendChild(box);
  });
  gc.appendChild(gg);
  if(editGoals) gc.insertAdjacentHTML('beforeend','<div class="ainote">💡 Coach : vise -500 kcal/jour (→ -0.5kg/sem). Si plateau 2 semaines → baisser de 100 kcal. Minimum absolu : 1800 kcal.</div>');
  pg.appendChild(gc);

  // API key
  const ac=el('div','card mb12');
  ac.innerHTML=`<div class="lbl">IA POUR ANALYSE PHOTO</div>`;

  // Provider selector
  const provRow=el('div','row mb12');
  provRow.innerHTML='<span style="font-size:11px;color:var(--mu);min-width:80px">Fournisseur :</span>';
  const provSel=el('select','inp'); provSel.style.flex='1';
  [
    {v:'gemini',  l:'🟢 Google Gemini (GRATUIT — recommandé)'},
    {v:'anthropic',l:'🟡 Anthropic Claude (5$ offerts)'},
  ].forEach(({v,l})=>{
    const o=el('option'); o.value=v; o.textContent=l;
    if(v===sett.aiProvider) o.selected=true;
    provSel.appendChild(o);
  });
  provSel.onchange=e=>{ sett.aiProvider=e.target.value; sv('cfg',sett); drawParams(); };
  provRow.appendChild(provSel); ac.appendChild(provRow);

  // Info block by provider
  const infoBlock=el('div');
  if(sett.aiProvider==='gemini'){
    infoBlock.innerHTML=`
      <div style="background:#00FF8711;border:1px solid #00FF8733;border-radius:8px;padding:12px;margin-bottom:12px;font-size:11px;line-height:1.7">
        <b style="color:var(--gr)">✅ Totalement gratuit</b> — aucune carte bancaire requise<br>
        • ~1500 analyses/jour gratuites<br>
        • Modèle : Gemini 1.5 Flash<br>
        • Obtenir une clé : <b>aistudio.google.com</b> → "Get API Key"<br>
        • La clé commence par <code style="color:var(--ye)">AIza...</code>
      </div>`;
  } else {
    infoBlock.innerHTML=`
      <div style="background:#FFD60011;border:1px solid #FFD60033;border-radius:8px;padding:12px;margin-bottom:12px;font-size:11px;line-height:1.7">
        <b style="color:var(--ye)">⚠️ 5$ de crédits offerts</b> à l'inscription, puis payant<br>
        • ~500 analyses avec les crédits gratuits<br>
        • Modèle : Claude (très précis)<br>
        • Obtenir une clé : <b>console.anthropic.com</b> → "API Keys"<br>
        • La clé commence par <code style="color:var(--ye)">sk-ant-...</code>
      </div>`;
  }
  ac.appendChild(infoBlock);

  // Key input
  const keyRow=el('div');
  keyRow.innerHTML=`<div style="font-size:9px;color:var(--mu);letter-spacing:2px;margin-bottom:6px">CLÉ API</div>`;
  const ai=el('input'); ai.type='password'; ai.className='inp';
  ai.placeholder=sett.aiProvider==='gemini'?'AIza...':'sk-ant-...';
  ai.value=sett.apiKey||''; ai.style.marginBottom='10px';
  const asb=el('button','btn bor bsm'); asb.textContent='💾 SAUVEGARDER';
  asb.onclick=()=>{ sett.apiKey=ai.value; sv('cfg',sett); sdraft.apiKey=sett.apiKey; toast('✅ Clé API sauvegardée !'); };
  keyRow.append(ai,asb); ac.appendChild(keyRow);

  // Test button
  if(sett.apiKey){
    const testRow=el('div'); testRow.style.marginTop='10px';
    const tb=el('button','btn bgh bsm'); tb.textContent='🧪 Tester la connexion';
    tb.onclick=async()=>{
      tb.textContent='Test en cours...'; tb.disabled=true;
      try{
        if(sett.aiProvider==='gemini'){
          const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${sett.apiKey}`);
          const d=await r.json();
          if(d.error) throw new Error(d.error.message);
          toast('✅ Connexion Gemini OK !');
        } else {
          const r=await fetch('https://api.anthropic.com/v1/models',{headers:{'x-api-key':sett.apiKey,'anthropic-version':'2023-06-01'}});
          if(!r.ok) throw new Error('Clé invalide');
          toast('✅ Connexion Anthropic OK !');
        }
      }catch(e){ toast('❌ Erreur : '+(e.message||'Clé invalide')); }
      tb.textContent='🧪 Tester la connexion'; tb.disabled=false;
    };
    testRow.appendChild(tb); ac.appendChild(testRow);
  }
  pg.appendChild(ac);

  // Programme
  const pc=el('div','card mb12');
  pc.innerHTML='<div class="lbl">PROGRAMME — 7 JOURS</div>';
  DAYS.forEach(d=>{
    const info=prog[d]||{name:d,type:'rest',exercises:[]};
    const col=DCOL[d]; const isR=info.type==='rest';
    const sec=el('div'); sec.style.cssText='margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--bd)';

    const hrow=el('div','row mb8');
    const dlbl=el('span'); dlbl.textContent=d.toUpperCase(); dlbl.style.cssText=`font-size:9px;color:${col};letter-spacing:3px;font-weight:700;min-width:58px`;
    const ni=el('input','einp'); ni.value=info.name;
    ni.onchange=e=>{ prog[d].name=e.target.value; sv('prg',prog); };
    const tp=el('button','tpill');
    tp.textContent=isR?'💤 REPOS':'🏋️ TRAIN';
    tp.style.cssText=`background:${isR?'#4A506022':col+'22'};color:${isR?'var(--mu)':col};border:1px solid ${isR?'var(--mu)':col}`;
    tp.onclick=()=>{ prog[d].type=isR?'training':'rest'; sv('prg',prog); drawParams(); };
    hrow.append(dlbl,ni,tp); sec.appendChild(hrow);

    info.exercises.forEach(ex=>{
      const er=el('div','exrow');
      const en=el('input','exinp'); en.value=ex.name;
      en.onchange=e=>{ ex.name=e.target.value; sv('prg',prog); };
      const si=el('input','eism'); si.type='number'; si.value=ex.sets; si.style.width='30px';
      si.onchange=e=>{ ex.sets=parseInt(e.target.value)||1; sv('prg',prog); };
      const xsp=el('span'); xsp.textContent='×'; xsp.style.cssText='font-size:9px;color:var(--mu)';
      const ri=el('input','eism'); ri.value=ex.reps; ri.style.width='50px';
      ri.onchange=e=>{ ex.reps=e.target.value; sv('prg',prog); };
      const rm=el('button'); rm.textContent='×'; rm.style.cssText='background:none;border:none;color:var(--pk);font-size:16px;cursor:pointer;opacity:.7';
      rm.onclick=()=>{ prog[d].exercises=prog[d].exercises.filter(x=>x.id!==ex.id); sv('prg',prog); drawParams(); };
      er.append(en,si,xsp,ri,rm); sec.appendChild(er);
    });

    const add=el('button','addex'); add.textContent='+ AJOUTER UN EXERCICE / ACTIVITÉ';
    add.onclick=()=>{ prog[d].exercises.push({id:uid(),name:'Nouvel exercice',sets:3,reps:'10'}); sv('prg',prog); drawParams(); };
    sec.appendChild(add); pc.appendChild(sec);
  });
  pg.appendChild(pc);

  // Backup
  const bc=el('div','card mb12');
  bc.innerHTML=`
    <div class="lbl">💾 SAUVEGARDE DE TES DONNÉES</div>
    <p style="font-size:11px;color:var(--mu);line-height:1.7;margin-bottom:14px">
      Tes données sont stockées sur ton téléphone.<br>
      <b style="color:var(--ye)">Exporte régulièrement</b> pour ne jamais perdre ton suivi<br>
      (changement de téléphone, mise à jour, etc.)
    </p>`;

  // Last backup info
  const lastBk=ST.get('lastBackup');
  if(lastBk) bc.insertAdjacentHTML('beforeend',`<div style="font-size:10px;color:var(--mu);margin-bottom:12px;padding:8px 12px;background:var(--fa);border-radius:8px">Dernière sauvegarde : <b style="color:var(--gr)">${new Date(lastBk).toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'})}</b></div>`);

  // Stats
  const stats={
    seances: sess.length,
    mensurations: meas.length,
    jours_calories: Object.keys(cals).length,
    supplements: supp.length,
  };
  bc.insertAdjacentHTML('beforeend',`
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:14px">
      ${Object.entries(stats).map(([k,v])=>`<div style="background:var(--fa);border-radius:8px;padding:8px;text-align:center"><div style="font-size:18px;font-weight:700;color:var(--or)">${v}</div><div style="font-size:8px;color:var(--mu);margin-top:2px">${k.replace('_',' ')}</div></div>`).join('')}
    </div>`);

  // Export button
  const exBtn=el('button','btn bor bful mb8'); exBtn.textContent='📤 EXPORTER MES DONNÉES (.json)';
  exBtn.onclick=()=>{
    const backup={
      version:2,
      date: new Date().toISOString(),
      sett, prog, meas, sess, cals, supp, slog
    };
    const json=JSON.stringify(backup,null,2);
    const blob=new Blob([json],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;
    a.download=`ShockTheWorld_backup_${ts()}.json`;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a); URL.revokeObjectURL(url);
    ST.set('lastBackup', new Date().toISOString());
    toast('✅ Sauvegarde téléchargée !'); drawParams();
  };
  bc.appendChild(exBtn);

  // Import button
  const imBtn=el('button','btn bgh bful mb8'); imBtn.textContent='📥 IMPORTER UNE SAUVEGARDE';
  imBtn.onclick=()=>{
    const inp=document.createElement('input'); inp.type='file'; inp.accept='.json';
    inp.onchange=e=>{
      const file=e.target.files[0]; if(!file) return;
      const reader=new FileReader();
      reader.onload=ev=>{
        try{
          const data=JSON.parse(ev.target.result);
          if(!data.version||!data.date) throw new Error('Fichier invalide');
          if(!confirm(`Importer la sauvegarde du ${new Date(data.date).toLocaleDateString('fr-FR')} ?\n\nCela remplacera toutes tes données actuelles.`)) return;
          if(data.sett){ sett=data.sett; sv('cfg',sett); }
          if(data.prog){ prog=data.prog; sv('prg',prog); }
          if(data.meas){ meas=data.meas; sv('ms',meas); }
          if(data.sess){ sess=data.sess; sv('ss',sess); }
          if(data.cals){ cals=data.cals; sv('cal',cals); }
          if(data.supp){ supp=data.supp; sv('sup',supp); }
          if(data.slog){ slog=data.slog; sv('slog',slog); }
          toast('✅ Données importées avec succès !');
          setTimeout(()=>{ drawParams(); updateHdr(); },500);
        }catch(err){ toast('❌ Fichier invalide ou corrompu'); }
      };
      reader.readAsText(file);
    };
    inp.click();
  };
  bc.appendChild(imBtn);

  bc.insertAdjacentHTML('beforeend','<div style="font-size:10px;color:var(--mu);text-align:center;line-height:1.6">📁 Le fichier JSON sera dans tes Téléchargements<br>Sauvegarde-le sur Google Drive ou iCloud pour plus de sécurité</div>');
  pg.appendChild(bc);

  // Reset
  const rc=el('div','card');
  rc.innerHTML='<div class="lbl">RÉINITIALISATION</div>';
  const rb=el('button','btn bdn bsm'); rb.textContent='🔄 RÉINITIALISER LE PROGRAMME';
  rb.onclick=()=>{ if(confirm('Remettre le programme par défaut ?')){ prog=JSON.parse(JSON.stringify(DPROG)); sv('prg',prog); drawParams(); toast('Programme réinitialisé !'); } };
  rc.appendChild(rb); pg.appendChild(rc);
}

/* ===================== INIT ===================== */
updateHdr();
drawDash();
</script>
